<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Mensajes de Luz — Oracle angélico con los siete arcángeles principales">
<meta name="theme-color" content="#05030f">
<title>Mensajes de Luz ✦ Oracle Angélico</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --miguel:#1a4fa0;--miguel2:#4a90d9;--miguel3:#c8900a;
  --gabriel:#3a3a6a;--gabriel2:#9090c0;--gabriel3:#e8e8ff;
  --rafael:#0a5a2a;--rafael2:#3aaa5a;--rafael3:#90e890;
  --uriel:#8a4000;--uriel2:#e8a800;--uriel3:#ffd060;
  --chamuel:#7a1a50;--chamuel2:#e870a0;--chamuel3:#ffb0d0;
  --jofiel:#7a6a00;--jofiel2:#d0a800;--jofiel3:#f8e060;
  --zadquiel:#3a0a7a;--zadquiel2:#9040e0;--zadquiel3:#c080ff;
}
html,body{height:100%;overflow-x:hidden}
body{
  background:#05030f;
  color:#f0e8d0;
  font-family:'Cormorant Garamond',serif;
  min-height:100vh;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.app{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  position:relative;
  overflow:hidden;
  padding-bottom:40px;
}
#starCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
#particleCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}

/* ── HEADER ── */
.header{
  position:relative;z-index:10;
  text-align:center;
  padding:36px 20px 10px;
  width:100%;
}
.header-eyebrow{
  font-family:'Cinzel',serif;
  font-size:9px;letter-spacing:5px;
  color:#b8a070;text-transform:uppercase;
  margin-bottom:10px;
}
.header-title{
  font-family:'Cinzel',serif;
  font-size:26px;font-weight:600;
  color:#f5e8c0;line-height:1.2;
  text-shadow:0 0 40px rgba(200,160,80,0.6);
}
.header-sub{
  font-size:13px;font-style:italic;
  color:#9080a0;margin-top:8px;letter-spacing:0.5px;
}

/* ── MAIN PHRASE ── */
.main-phrase{
  position:relative;z-index:10;
  text-align:center;padding:18px 28px 10px;
  max-width:360px;
}
.phrase-line1{font-size:13px;color:#b8a070;letter-spacing:1px;margin-bottom:6px;font-style:italic}
.phrase-line2{font-family:'Cinzel',serif;font-size:16px;color:#e8d090;line-height:1.5}
.phrase-line3{font-size:12px;color:#8070a0;margin-top:8px;font-style:italic;letter-spacing:0.5px}

/* ── WHEEL ── */
.wheel-section{
  position:relative;z-index:10;
  display:flex;flex-direction:column;align-items:center;
  margin:14px 0 6px;
}
.wheel-wrapper{
  position:relative;width:300px;height:300px;
  display:flex;align-items:center;justify-content:center;
}
.breathe-ring{
  position:absolute;border-radius:50%;
  border:1px solid rgba(200,160,80,0.1);
  pointer-events:none;
  animation:breatheOut 4s ease-in-out infinite;
}
@keyframes breatheOut{
  0%,100%{transform:scale(0.92);opacity:0.6}
  50%{transform:scale(1.08);opacity:0.15}
}
.wheel-glow{
  position:absolute;width:300px;height:300px;
  border-radius:50%;pointer-events:none;
  transition:box-shadow 0.8s ease;
}
#wheelCanvas{
  position:relative;z-index:2;cursor:pointer;
  border-radius:50%;
  filter:drop-shadow(0 0 24px rgba(150,120,200,0.35));
  transition:filter 0.5s ease;
}
#wheelCanvas:active{transform:scale(0.98)}
.wheel-center{
  position:absolute;z-index:5;
  width:54px;height:54px;border-radius:50%;
  background:radial-gradient(circle,#1a1020 0%,#0a0815 100%);
  border:1.5px solid rgba(200,160,80,0.5);
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
  box-shadow:0 0 24px rgba(200,160,80,0.3),inset 0 0 16px rgba(0,0,0,0.8);
}
.center-symbol{font-size:22px;animation:centerPulse 3s ease-in-out infinite}
@keyframes centerPulse{
  0%,100%{opacity:0.7;transform:scale(1)}
  50%{opacity:1;transform:scale(1.12)}
}
.spin-pointer{
  position:absolute;top:-10px;left:50%;
  transform:translateX(-50%);z-index:6;
  width:0;height:0;
  border-left:9px solid transparent;
  border-right:9px solid transparent;
  border-bottom:24px solid #e8c060;
  filter:drop-shadow(0 0 10px rgba(232,192,96,0.9));
}

/* ── SPIN BUTTON ── */
.spin-btn{
  position:relative;z-index:10;
  margin:18px 0 10px;
  padding:15px 52px;
  background:transparent;
  border:1px solid rgba(200,160,80,0.4);
  color:#e8d090;
  font-family:'Cinzel',serif;font-size:13px;
  letter-spacing:3px;cursor:pointer;
  border-radius:2px;
  transition:all 0.3s ease;
  text-transform:uppercase;overflow:hidden;
}
.spin-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(200,160,80,0.06),rgba(150,100,200,0.06));
  opacity:0;transition:opacity 0.3s;
}
.spin-btn:hover::before{opacity:1}
.spin-btn:hover{
  border-color:rgba(200,160,80,0.9);color:#f5e8c0;
  box-shadow:0 0 24px rgba(200,160,80,0.25),inset 0 0 24px rgba(200,160,80,0.06);
}
.spin-btn:active{transform:scale(0.97)}
.spin-btn:disabled{opacity:0.35;cursor:not-allowed;transform:none}

/* ── ARC TAGS ── */
.arc-names{
  display:flex;flex-wrap:wrap;justify-content:center;
  gap:6px;max-width:330px;
  margin-top:4px;z-index:10;position:relative;
}
.arc-tag{
  font-size:9px;letter-spacing:1.5px;
  padding:4px 9px;border-radius:1px;
  border:1px solid;text-transform:uppercase;
  opacity:0.55;transition:all 0.4s;cursor:default;
}
.arc-tag.active{opacity:1;transform:scale(1.06)}

/* ── MESSAGE CARD OVERLAY ── */
.card-overlay{
  position:fixed;inset:0;z-index:100;
  display:flex;align-items:center;justify-content:center;
  background:rgba(5,3,15,0);
  pointer-events:none;
  transition:background 0.5s ease;
  padding:16px;
}
.card-overlay.visible{
  background:rgba(5,3,15,0.88);
  pointer-events:all;
}
.message-card{
  position:relative;
  width:330px;max-width:100%;
  transform:scale(0.82) translateY(36px);
  opacity:0;
  transition:all 0.6s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events:none;
}
.card-overlay.visible .message-card{
  transform:scale(1) translateY(0);
  opacity:1;pointer-events:all;
}
.card-glass{
  background:rgba(10,8,22,0.94);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:14px;
  overflow:hidden;
  backdrop-filter:blur(24px);
}
.card-top-bar{height:4px;width:100%}
.card-inner{padding:28px 26px 22px;position:relative}
.close-btn{
  position:absolute;top:14px;right:16px;
  background:none;border:none;
  color:rgba(200,180,150,0.45);
  font-size:20px;cursor:pointer;
  transition:color 0.2s;
  font-family:'Cormorant Garamond',serif;line-height:1;
  padding:4px;
}
.close-btn:hover{color:rgba(200,180,150,1)}
.card-arc-name{
  font-family:'Cinzel',serif;font-size:19px;font-weight:600;
  text-align:center;margin-bottom:4px;
}
.card-arc-title{
  font-size:11px;letter-spacing:3px;
  text-align:center;text-transform:uppercase;
  opacity:0.55;margin-bottom:14px;
}
.card-symbol{
  text-align:center;font-size:40px;
  margin:14px 0;
  animation:symbolFloat 4s ease-in-out infinite;
}
@keyframes symbolFloat{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-7px)}
}
.card-divider{
  width:64px;height:1px;
  margin:10px auto 16px;opacity:0.3;
}
.card-message{
  font-size:15.5px;line-height:1.85;
  text-align:center;color:#ede4cc;
  font-style:italic;
  margin-bottom:16px;padding:0 2px;
}
.card-affirmation{
  font-family:'Cinzel',serif;
  font-size:11px;letter-spacing:2px;
  text-align:center;text-transform:uppercase;
  padding:11px 14px;border-radius:4px;
  border:1px solid rgba(255,255,255,0.07);
  margin-bottom:10px;line-height:1.6;
}
.card-energy{
  font-size:10px;letter-spacing:2px;
  text-align:center;margin-bottom:18px;
  opacity:0.45;text-transform:uppercase;
}
.card-actions{
  display:flex;gap:8px;justify-content:center;
  flex-wrap:wrap;
}
.card-btn{
  padding:10px 18px;border-radius:2px;
  font-family:'Cinzel',serif;font-size:10px;
  letter-spacing:2px;cursor:pointer;
  text-transform:uppercase;transition:all 0.2s;
  border:1px solid rgba(255,255,255,0.12);
  background:transparent;color:#d0c8b0;
}
.card-btn:hover{background:rgba(255,255,255,0.07);color:#f0e8c8}
.card-btn:active{transform:scale(0.96)}

/* ── HISTORY ── */
.history-section{
  position:relative;z-index:10;
  width:100%;max-width:350px;
  padding:0 16px 20px;
}
.history-title{
  font-family:'Cinzel',serif;font-size:10px;
  letter-spacing:3px;text-transform:uppercase;
  color:#605080;text-align:center;
  margin:24px 0 14px;
}
.history-list{display:flex;flex-direction:column;gap:8px}
.history-item{
  background:rgba(255,255,255,0.025);
  border:1px solid rgba(255,255,255,0.05);
  border-left-width:2px;
  border-radius:6px;
  padding:11px 14px;
  display:flex;gap:12px;align-items:center;
  cursor:pointer;transition:all 0.2s;
}
.history-item:hover{background:rgba(255,255,255,0.055)}
.hist-symbol{font-size:22px;flex-shrink:0}
.hist-info{flex:1;min-width:0}
.hist-name{
  font-family:'Cinzel',serif;
  font-size:11px;letter-spacing:1px;margin-bottom:3px;
}
.hist-preview{
  font-size:11px;color:#6a5a80;
  white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;font-style:italic;
}
.hist-time{font-size:9px;color:#483a5a;letter-spacing:1px;flex-shrink:0}

/* ── EMPTY HISTORY ── */
.history-empty{
  text-align:center;font-size:12px;font-style:italic;
  color:#4a3a6a;padding:20px 0;letter-spacing:0.5px;
}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(60px);
  background:rgba(18,12,32,0.97);
  border:1px solid rgba(200,160,80,0.28);
  color:#e8d090;padding:11px 22px;
  border-radius:3px;font-size:12px;
  letter-spacing:1px;z-index:200;
  transition:transform 0.35s cubic-bezier(0.34,1.4,0.64,1);
  pointer-events:none;white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ── AMBIENT TOGGLE ── */
.ambient-btn{
  position:fixed;top:16px;right:16px;z-index:50;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(200,160,80,0.2);
  color:#b8a070;font-size:16px;
  width:36px;height:36px;border-radius:50%;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;
}
.ambient-btn:hover{background:rgba(200,160,80,0.1);color:#e8c070}

/* ── RESPONSIVE ── */
@media(max-width:380px){
  .header-title{font-size:22px}
  .wheel-wrapper{width:270px;height:270px}
  #wheelCanvas{width:252px!important;height:252px!important}
  .wheel-glow{width:270px;height:270px}
  .breathe-ring:first-child{width:288px!important;height:288px!important;top:-9px!important;left:-9px!important}
  .breathe-ring:last-child{width:308px!important;height:308px!important;top:-19px!important;left:-19px!important}
}
</style>
</head>

  </div>
</div>

<div class="toast" id="toast"></div>

//  UTILS
// ═══════════════════════════════════════════════
function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}
function generateMessage(arc){
  return pick(arc.intros)+' '+pick(arc.guides)+' '+pick(CLOSES);
}

// ═══════════════════════════════════════════════
//  STARS
// ═══════════════════════════════════════════════
const starCanvas=document.getElementById('starCanvas');
const sCtx=starCanvas.getContext('2d');
let stars=[];

function initStars(){
  starCanvas.width=window.innerWidth;
  starCanvas.height=window.innerHeight;
  stars=[];
  for(let i=0;i<200;i++){
    stars.push({
      x:Math.random()*starCanvas.width,
      y:Math.random()*starCanvas.height,
      r:Math.random()*1.3+0.15,
      a:Math.random()*0.8+0.1,
      speed:Math.random()*0.003+0.0008,
      phase:Math.random()*Math.PI*2
    });
  }
}

function drawStars(t){
  sCtx.clearRect(0,0,starCanvas.width,starCanvas.height);
  stars.forEach(s=>{
    const alpha=s.a*(0.45+0.55*Math.sin(t*s.speed+s.phase));
    sCtx.beginPath();
    sCtx.arc(s.x,s.y,s.r,0,Math.PI*2);
    sCtx.fillStyle=`rgba(210,190,255,${alpha})`;
    sCtx.fill();
  });
}

// ═══════════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════════
const pCanvas=document.getElementById('particleCanvas');
const pCtx=pCanvas.getContext('2d');
let particles=[];

function initParticles(){
  pCanvas.width=window.innerWidth;
  pCanvas.height=window.innerHeight;
}

function spawnParticles(color,count,cx,cy){
  cx=cx||window.innerWidth/2;
  cy=cy||window.innerHeight*0.4;
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=Math.random()*2.5+0.4;
    particles.push({
      x:cx,y:cy,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed-1.8,
      r:Math.random()*2.8+0.6,
      a:0.9,
      color,
      decay:Math.random()*0.009+0.003
    });
  }
}

function drawParticles(){
  pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
  particles=particles.filter(p=>p.a>0.02);
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy;
    p.vy+=0.025; p.a-=p.decay;
    const c=p.color.replace(/[\d.]+\)$/,p.a.toFixed(2)+')');
    pCtx.beginPath();
    pCtx.arc(p.x,p.y,p.r,0,Math.PI*2);
    pCtx.fillStyle=c;
    pCtx.fill();
  });
}

// ═══════════════════════════════════════════════
//  WHEEL
// ═══════════════════════════════════════════════
const wCanvas=document.getElementById('wheelCanvas');
const wCtx=wCanvas.getContext('2d');
const W=284, CX=W/2, CY=W/2, R=130;
let wheelAngle=0, spinning=false, currentArc=null, spinVel=0;
const SYMBOLS=['⚔','🪶','✦','◈','♡','✺','⬡'];

function drawWheel(t){
  wCtx.clearRect(0,0,W,W);
  const n=ARCHANGELS.length;
  const segAngle=Math.PI*2/n;

  for(let i=0;i<n;i++){
    const startA=wheelAngle+i*segAngle-Math.PI/2;
    const endA=startA+segAngle;
    const mid=startA+segAngle/2;
    const isActive=currentArc&&ARCHANGELS[i].name===currentArc.name;

    // Segment gradient
    const sg=wCtx.createLinearGradient(
      CX+Math.cos(mid)*20, CY+Math.sin(mid)*20,
      CX+Math.cos(mid)*R,  CY+Math.sin(mid)*R
    );
    sg.addColorStop(0, ARCHANGELS[i].segColors[0]);
    sg.addColorStop(1, ARCHANGELS[i].segColors[1]);

    wCtx.beginPath();
    wCtx.moveTo(CX,CY);
    wCtx.arc(CX,CY,R,startA,endA);
    wCtx.closePath();
    wCtx.fillStyle=sg;
    wCtx.fill();

    // Border
    wCtx.strokeStyle=isActive?'rgba(255,240,180,0.9)':'rgba(40,30,60,0.9)';
    wCtx.lineWidth=isActive?1.8:0.8;
    wCtx.stroke();

    // Symbol
    const sr=R*0.67;
    const sx=CX+Math.cos(mid)*sr;
    const sy=CY+Math.sin(mid)*sr;
    wCtx.save();
    wCtx.translate(sx,sy);
    if(isActive){
      const pulse=1+0.08*Math.sin(t*0.004);
      wCtx.scale(pulse,pulse);
    }
    wCtx.font='18px serif';
    wCtx.textAlign='center';
    wCtx.textBaseline='middle';
    wCtx.fillStyle=isActive?'#ffe090':'rgba(220,200,255,0.82)';
    if(isActive){
      wCtx.shadowColor=ARCHANGELS[i].color2;
      wCtx.shadowBlur=14;
    }
    wCtx.fillText(SYMBOLS[i],0,0);
    wCtx.restore();
  }

  // Outer ring glow
  const ringGrad=wCtx.createRadialGradient(CX,CY,R-6,CX,CY,R+6);
  ringGrad.addColorStop(0,'rgba(200,160,80,0.35)');
  ringGrad.addColorStop(1,'transparent');
  wCtx.beginPath();
  wCtx.arc(CX,CY,R+3,0,Math.PI*2);
  wCtx.strokeStyle=ringGrad;
  wCtx.lineWidth=7;
  wCtx.stroke();

  // Rim line
  wCtx.beginPath();
  wCtx.arc(CX,CY,R,0,Math.PI*2);
  wCtx.strokeStyle='rgba(200,160,80,0.4)';
  wCtx.lineWidth=1.5;
  wCtx.stroke();

  // Center cover (drawn by CSS overlay)
}

function getIndexAtTop(){
  const n=ARCHANGELS.length, seg=Math.PI*2/n;
  let a=((-wheelAngle+Math.PI/2)%(Math.PI*2)+Math.PI*2)%(Math.PI*2);
  return Math.floor(a/seg)%n;
}

function spin(){
  if(spinning)return;
  spinning=true;
  document.getElementById('spinBtn').disabled=true;
  const n=ARCHANGELS.length;
  const targetIndex=Math.floor(Math.random()*n);
  const seg=Math.PI*2/n;
  const current=((-wheelAngle+Math.PI/2)%(Math.PI*2)+Math.PI*2)%(Math.PI*2);
  const diff=((targetIndex*seg)-current+Math.PI*2)%(Math.PI*2);
  spinVel=diff+Math.PI*2*5;
  spawnParticles('rgba(200,160,80,0.8)',35);
}

// ═══════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════
function loop(t){
  requestAnimationFrame(loop);
  drawStars(t);
  drawParticles();

  if(spinning){
    const ease=Math.max(0.012, spinVel*0.016);
    wheelAngle+=ease;
    spinVel-=ease;
    if(spinVel<=0){
      spinning=false; spinVel=0;
      const idx=getIndexAtTop();
      currentArc=ARCHANGELS[idx];
      document.getElementById('spinBtn').disabled=false;
      document.getElementById('wheelGlow').style.boxShadow=
        `0 0 70px ${currentArc.glow}, 0 0 140px ${currentArc.glow.replace('0.5','0.18')}`;
      spawnParticles(currentArc.glow, 60);
      updateArcTags();
      setTimeout(()=>showCard(currentArc), 700);
    }
  }
  drawWheel(t);
}

// ═══════════════════════════════════════════════
//  ARC TAGS
// ═══════════════════════════════════════════════
function updateArcTags(){
  const container=document.getElementById('arcNames');
  container.innerHTML='';
  ARCHANGELS.forEach(a=>{
    const tag=document.createElement('div');
    tag.className='arc-tag'+(currentArc&&currentArc.name===a.name?' active':'');
    tag.style.color=a.textColor;
    tag.style.borderColor=currentArc&&currentArc.name===a.name?a.color2:a.color2+'55';
    if(currentArc&&currentArc.name===a.name){
      tag.style.background=a.color1+'28';
    }
    tag.textContent=a.short;
    container.appendChild(tag);
  });
}

  document.getElementById('cardArcName').style.color=arc.textColor;
  document.getElementById('cardArcTitle').textContent=arc.title;
  document.getElementById('cardArcTitle').style.color=arc.textColor;
  document.getElementById('cardSymbol').textContent=arc.symbol;
  document.getElementById('cardSymbol').style.textShadow=`0 0 32px ${arc.glow}`;
  document.getElementById('cardDivider').style.background=arc.color2;
  document.getElementById('cardMessage').textContent=currentMessage;
  document.getElementById('cardAffirmation').textContent='"'+aff+'"';
  document.getElementById('cardAffirmation').style.color=arc.textColor;
  document.getElementById('cardAffirmation').style.borderColor=arc.color2+'38';
  document.getElementById('cardAffirmation').style.background=arc.affirmationBg;
  document.getElementById('cardEnergy').textContent=energy;
  document.getElementById('cardEnergy').style.color=arc.color2;
  document.getElementById('messageCard').style.boxShadow=
    `0 0 70px ${arc.glow.replace('0.5','0.28')}, 0 24px 70px rgba(0,0,0,0.65)`;

function hideCard(){
  document.getElementById('cardOverlay').classList.remove('visible');
}

// ═══════════════════════════════════════════════
//  HISTORY
// ═══════════════════════════════════════════════
let history=[];
function addHistory(arc,msg){
  const now=new Date();
  const time=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  history.unshift({arc,msg,time});
  if(history.length>6)history.pop();
  renderHistory();
}

function renderHistory(){
  const list=document.getElementById('historyList');
  if(!history.length){
    list.innerHTML='<div class="history-empty">Gira la rueda para recibir tu primer mensaje</div>';
    return;
  }
  list.innerHTML='';
  history.forEach(h=>{
    const item=document.createElement('div');
    item.className='history-item';
    item.style.borderLeftColor=h.arc.color2+'70';
    item.innerHTML=`
      <div class="hist-symbol">${h.arc.symbol}</div>
      <div class="hist-info">
        <div class="hist-name" style="color:${h.arc.textColor}">${h.arc.short}</div>
        <div class="hist-preview">${h.msg.substring(0,58)}…</div>
      </div>
      <div class="hist-time">${h.time}</div>
    `;
    item.onclick=()=>showCard(h.arc);
    list.appendChild(item);
  });
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// ═══════════════════════════════════════════════
//  AMBIENT SOUND (Web Audio API)
// ═══════════════════════════════════════════════
let audioCtx=null, ambientOn=false, gainNode=null, osc1=null, osc2=null;
function toggleAmbient(){
  const btn=document.getElementById('ambientBtn');
  if(!ambientOn){
    try{
      audioCtx=new(window.AudioContext||window.webkitAudioContext)();
      gainNode=audioCtx.createGain();
      gainNode.gain.setValueAtTime(0,audioCtx.currentTime);
      gainNode.gain.linearRampToValueAtTime(0.04,audioCtx.currentTime+2);
      gainNode.connect(audioCtx.destination);
      // Two gentle sine waves — 432Hz & 528Hz
      [432,528,396].forEach((freq,i)=>{
        const o=audioCtx.createOscillator();
        const g=audioCtx.createGain();
        o.type='sine';
        o.frequency.value=freq;
        g.gain.value=i===0?0.6:0.3;
        o.connect(g);g.connect(gainNode);
        o.start();
      });
      ambientOn=true;
      btn.textContent='♪';
      btn.style.color='#e8c070';
      showToast('♪ Música ambiental activada');
    }catch(e){showToast('Audio no disponible en este navegador')}
  } else {
    if(gainNode){gainNode.gain.linearRampToValueAtTime(0,audioCtx.currentTime+1);}
    setTimeout(()=>{if(audioCtx)audioCtx.close();audioCtx=null;},1100);
    ambientOn=false;
    btn.textContent='♪';
    btn.style.color='#b8a070';
    showToast('♪ Música ambiental desactivada');
  }
}
